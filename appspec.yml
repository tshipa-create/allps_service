version: 0.0
os: linux 
files:
  - source: /
    destination: /home/ec2-user
permissions:
  - object: /home/ec2-user
    pattern: "logs"
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - directory

hooks:
  AfterInstall:
    - location: scripts/install_dependencies
      timeout: 300
      runas: root